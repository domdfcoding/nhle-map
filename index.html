<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>England Listed Buildings Map</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

              crossorigin="anonymous">
        <link rel="stylesheet" href="style.css" />

    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.1.0/MarkerCluster.css"/>

    <body>

            <!-- Loading Bar Modal -->
            <div class="modal fade"
                 id="progress"
                 data-bs-backdrop="static"
                 data-bs-keyboard="false"
                 tabindex="-1"
                 aria-labelledby="progressLabel"
                 aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="progressLabel">Loading markers for area...</h1>
                        </div>
                        <div class="modal-body">
                            <div class="progress"
                                 role="progressbar"
                                 aria-label="Example with label"
                                 aria-valuenow="0"
                                 aria-valuemin="0"
                                 aria-valuemax="100">
                                <div class="progress-bar  progress-bar-striped progress-bar-animated"
                                     id="progress-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>



            <main class="map-container p-2">



            <div class="folium-map" id="map" ></div>

                    <p>
                        Zoom level: <span id="zoom"></span>
                    </p>


            </main>



            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                    crossorigin="anonymous"></script>


    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.1.0/leaflet.markercluster.js"></script>
    <script src="markers.js"></script>
    <script src="output/data/listed_buildings_id_lookup.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.66.2/L.Control.Locate.min.js"></script>
            <script>

            var mapOptions = {
  "zoom": 13,
  "zoomControl": true,
  "preferCanvas": false,
  "minZoom": 10,
  "maxZoom": 18,
  "wheelPxPerZoomLevel": 80,
};
            var defaultZoom = mapOptions["zoom"] ?? 0;
            var urlZoomState = zoomStateFromURL(defaultZoom, L.latLng([52.561928, -1.464854]));
            mapOptions["zoom"] = urlZoomState["zoomLvl"]

            var map = L.map(
                "map",
                {
                    center: urlZoomState["centre"],
                    crs: L.CRS.EPSG3857,
                    ...mapOptions

                }
            );





            var tile_layer_osm_carto = L.tileLayer(
                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
  "minZoom": 0,
  "maxZoom": 18,
  "maxNativeZoom": 18,
  "noWrap": false,
  "attribution": "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );


            tile_layer_osm_carto.addTo(map);


            var markers = L.markerClusterGroup(
                {
  "chunkedLoading": true,
}
            );
            markers.options.chunkProgress =
                updateProgressBar;
            markers.options.maxClusterRadius =
                getClusterRadius;


            const MAX_ZOOM = 18;

            const progress = document.getElementById('progress')
            var modal = bootstrap.Modal.getOrCreateInstance(progress)
            var progressBar = document.getElementById('progress-bar');

            console.log('start creating markers: ' + window.performance.now());
            map.addLayer(markers);

            var loaded_ids = [];

            load_new_markers()

            // map.on('zoomend', load_new_markers);
            map.on('moveend', load_new_markers);



			/*
Preserve zoom level and map position when reloading or sharing URLs
*/
function updateQueryStringParam (key, value) {
	const url = new URL(window.location.href);
	url.searchParams.set(key, value.toString()); // Add or update the parameter
	// window.history.pushState({}, null, url);
	window.history.replaceState({}, '', url);
}
function setupZoomState (map) {
	map.on('zoomend', function () {
		const zoomLvl = map.getZoom();
		updateQueryStringParam('zoom', zoomLvl);
	});
	map.on('moveend', function () {
		const centre = map.getCenter();
		updateQueryStringParam('lat', centre.lat);
		updateQueryStringParam('lng', centre.lng);
	});
}
function zoomStateFromURL (defaultZoom, defaultCentre) {
	const url = new URL(window.location.href);
	// let zoomLvl = map.getZoom();
	let zoomLvl = defaultZoom;
	if (url.searchParams.has('zoom')) {
		zoomLvl = parseInt(url.searchParams.get('zoom'));
	}
	// const centre = map.getCenter();
	const centre = defaultCentre;
	if (url.searchParams.has('lat')) {
		centre.lat = parseFloat(url.searchParams.get('lat'));
	}
	if (url.searchParams.has('lng')) {
		centre.lng = parseFloat(url.searchParams.get('lng'));
	}
	return { centre, zoomLvl };
}
function basemapFromURL (defaultBasemap, layerControl) {
	let _a;
	const url = new URL(window.location.href);
	const basemapLayers = Object.fromEntries(
		/* @ts-expect-error _layers does exist but is private */
		layerControl._layers.map((element) => [element.name, element.layer]));
	if (url.searchParams.has('basemap')) {
		const basemapName = (_a = url.searchParams.get('basemap')) !== null && _a !== void 0 ? _a : defaultBasemap;
		console.log(basemapName);
		if (basemapName in basemapLayers) {
			return basemapLayers[basemapName];
		}
	}
	return basemapLayers[defaultBasemap];
}
function setupBasemapState (map) {
	map.on('baselayerchange', (e) => updateQueryStringParam('basemap', e.name));
}
			setupZoomState(map);

			setupBasemapState(map);



            var locate_control = L.control.locate(
                {"icon": "fas fa-location-crosshairs"}
            ).addTo(map);



            map.on('zoomend', showZoomLevel);
            showZoomLevel();

            function showZoomLevel() {
                document.getElementById('zoom').innerHTML = map.getZoom();
            }


            map.attributionControl.setPrefix(`<a target="_blank" href="https://leafletjs.com" title="A JavaScript library for interactive maps">🇺🇦 Leaflet</a> | Data © Historic England 2026 (OGL)`)
            </script>

    </body>
</html>
